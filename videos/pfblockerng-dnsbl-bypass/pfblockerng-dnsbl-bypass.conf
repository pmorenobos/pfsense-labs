# ============================================================
# pfBlockerNG DNSBL Bypass con Unbound en pfSense
# ============================================================
#
# Descripción:
# Configuración de ejemplo para excluir una IP específica del
# filtrado DNSBL de pfBlockerNG usando vistas de Unbound.
#
# Escenario:
# - Cliente en bypass: 192.168.8.99/32
# - Red LAN con DNSBL: 192.168.8.0/24
# - Segunda red con DNSBL: 192.168.100.0/24
#
# Notas:
# - La IP específica debe declararse antes que la red completa.
# - Ajusta las IPs según tu infraestructura.
# - Valida en laboratorio antes de usar en producción.
# - Revisa logs de Unbound y pfBlockerNG después de aplicar cambios.
#
# Autor: Pedro Moreno / Baja Open Solutions
# Proyecto: pfSense Labs
# ============================================================

server:
    access-control-view: 192.168.8.99/32 bypass
    access-control-view: 192.168.8.0/24 dnsbl1
    access-control-view: 192.168.100.0/24 dnsbl2

view:
    name: "bypass"
    view-first: yes

view:
    name: "dnsbl1"
    view-first: yes
    include: /var/unbound/pfb_dnsbl.*conf

view:
    name: "dnsbl2"
    view-first: yes
    include: /var/unbound/pfb_dnsbl.*conf
